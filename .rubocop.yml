require:
  - rubocop-rspec

AllCops:
  TargetRubyVersion: 3.4
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - 'vendor/**/*'
    - 'Gemfile'

# 教材コードはメソッド長・複雑度の制限を緩和
Metrics/MethodLength:
  Max: 80

Metrics/BlockLength:
  Exclude:
    - '**/*_spec.rb'
    - 'spec/**/*'

Metrics/ClassLength:
  Max: 300

Metrics/ModuleLength:
  Max: 500

Metrics/AbcSize:
  Max: 80

Metrics/CyclomaticComplexity:
  Max: 20

Metrics/PerceivedComplexity:
  Max: 20

Metrics/ParameterLists:
  Max: 8

# 教材としてのコメント密度を許容
Style/Documentation:
  Enabled: false

# frozen_string_literal マジックコメント必須
Style/FrozenStringLiteralComment:
  EnforcedStyle: always

# 日本語コメントを許容
Style/AsciiComments:
  Enabled: false

# 文字列結合を許容（教材コードの可読性のため）
Style/StringConcatenation:
  Enabled: false

# マルチラインブロックチェーンを許容（ActiveRecordクエリビルダのため）
Style/MultilineBlockChain:
  Enabled: false

# RSpec用の設定
RSpec/MultipleExpectations:
  Max: 10

RSpec/ExampleLength:
  Max: 30

RSpec/DescribeClass:
  Enabled: false

RSpec/ContextWording:
  Enabled: false

RSpec/NestedGroups:
  Max: 5

RSpec/SpecFilePathFormat:
  Enabled: false

RSpec/ExpectActual:
  Enabled: false

RSpec/VerifiedDoubles:
  Enabled: false

RSpec/NamedSubject:
  Enabled: false

RSpec/MessageSpies:
  Enabled: false

RSpec/IteratedExpectation:
  Enabled: false

# 教材コードではis_xxx?やhas_xxx?の命名規則を緩和
Naming/PredicateMethod:
  Enabled: false

Naming/AccessorMethodName:
  Enabled: false

# 教材コードでは変数名の数字規約を緩和
Naming/VariableNumber:
  Enabled: false

# 教材コードではメソッドパラメータ名の制限を緩和
Naming/MethodParameterName:
  MinNameLength: 1

# 重複ブランチは教材の明示性のために許容
Lint/DuplicateBranch:
  Enabled: false

# 教材コードでは puts を許容
Rails/Output:
  Enabled: false

Naming/FileName:
  Exclude:
    - '**/*_spec.rb'
